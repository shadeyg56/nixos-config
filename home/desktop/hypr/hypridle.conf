
general {
    lock_cmd = hyprlock
    before_sleep_cmd = hyprlock
    ignore_dbus_inhibit = false
    ignore_systemd_inhibit = false
    inhibit_sleep = 3
}

# Idle timeout
listener {
    timeout = 600
    on-timeout = loginctl lock-session
}
